# Docker Compose for OpenWakeWord Trainer.
#
# Quickstart (NVIDIA host with nvidia-container-toolkit installed):
#   cp .env.example .env
#   docker compose up --build
#   open http://localhost:8000
#
# DGX Spark (Grace+Blackwell, aarch64):
#   Same commands. Compose auto-detects the platform; CUDA 12.8 base supports GB10.
#   If you hit "no matching manifest" errors, force-pull with:
#     docker pull --platform linux/arm64 nvidia/cuda:12.8.0-cudnn-runtime-ubuntu24.04

services:
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # auto = public onnxruntime-gpu wheel on linux/amd64, source build on linux/arm64.
        ORT_BUILD_FROM_SOURCE: ${OWW_ORT_BUILD_FROM_SOURCE:-auto}
        # Only used when ORT is source-built. RTX 4090 = 89, DGX Spark/RTX 50-series = 120.
        CUDA_ARCHITECTURES: ${OWW_CUDA_ARCHITECTURES:-120}
        BUILD_PARALLEL: ${OWW_BUILD_PARALLEL:-8}
    image: oww-trainer:latest
    container_name: oww-trainer
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      OWW_DATA_DIR: /data
      OWW_HOST: 0.0.0.0
      OWW_PORT: 8000
      # HF cache lives on the volume so re-creating the container does not re-download voices/datasets.
      HF_HOME: /data/cache/huggingface
      TORCH_HOME: /data/cache/torch
      XDG_CACHE_HOME: /data/cache
      # Kokoro uses CUDA by default. The trainer enables Kokoro's custom STFT
      # path to avoid Torch complex-kernel JIT issues on newer GPUs.
      OWW_KOKORO_DEVICE: ${OWW_KOKORO_DEVICE:-cuda}
    volumes:
      # Default: named docker volume (portable, no host setup).
      # Override OWW_DATA_DIR_HOST in .env to point at a host bind-mount path
      # (e.g. /opt/models/openwakeword-trainer) when you want the corpora to
      # live somewhere specific on the host.
      - ${OWW_DATA_DIR_HOST:-oww_data}:/data
      # Live-mount source for dev. Comment out for prod / immutable images.
      - ./src:/app/src:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Healthcheck pings the FastAPI /healthz endpoint.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    # SSE / long training jobs need generous shutdown grace.
    stop_grace_period: 30s
    # Larger shared memory + host IPC match common RTX 5090/vLLM Docker tuning
    # and help multiprocessing-heavy audio/features stages avoid shm pressure.
    shm_size: "8gb"
    ipc: host
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack: 67108864

volumes:
  oww_data:
    name: oww_trainer_data
