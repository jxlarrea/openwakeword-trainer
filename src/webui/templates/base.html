<!doctype html>
<html lang="en">

  <link rel="stylesheet" href="/static/style.css">

        </svg>

      <span class="byline">by Xavier Larrea</span>

  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
